<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exam Seat Finder</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <meta name="theme-color" content="#1a1a2e" />
    <link rel="manifest" href="./manifest.json" />
  </head>
  <body>
    <!-- THEME TOGGLE -->
    <button
      class="theme-toggle"
      id="themeToggle"
      title="Toggle day / night mode"
      aria-label="Toggle day/night mode"
    >
      <span class="icon-sun">☀️</span>
      <span class="icon-moon">🌙</span>
    </button>

    <!-- LOADING OVERLAY -->
    <div id="loadingOverlay" class="loading-overlay">
      <div class="loading-box">
        <div class="loading-spinner"></div>
        <p>Loading seating data…</p>
      </div>
    </div>

    <div class="container">
      <!-- HEADER -->
      <header>
        <div class="badge">Exam Hall System</div>
        <h1>Find Your Seat</h1>
        <p class="subtitle">
          Type your name below — your assigned seat will light up on the
          classroom map
        </p>

        <!-- ✅ NEW: Refresh button + last-updated label for admin convenience -->
        <div class="refresh-bar">
          <button
            class="btn-refresh"
            onclick="forceRefresh()"
            title="Reload data from Google Sheet"
          >
            ↺ Refresh Data
          </button>
        </div>
      </header>

      <!-- SEARCH -->
      <div class="search-card">
        <div class="search-wrap">
          <span class="search-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
              <path
                fill="rgb(255, 255, 255)"
                d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376C296.3 401.1 253.9 416 208 416 93.1 416 0 322.9 0 208S93.1 0 208 0 416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z"
              />
            </svg>
          </span>
          <input
            type="text"
            id="searchInput"
            placeholder="Enter your name…"
            autocomplete="off"
            spellcheck="false"
          />
          <div id="suggestions" class="suggestions"></div>
        </div>
        <button class="btn-clear" id="btnClear" onclick="clearSearch()">
          ✕
        </button>
        <button class="btn-search" onclick="doSearch()">Search</button>
      </div>

      <!-- RESULT CARD -->
      <div id="resultCard">
        <div class="res-title" id="resTitle"></div>
        <div class="res-body" id="resBody"></div>
      </div>

      <!-- CLASSROOM -->
      <div class="classroom-card">
        <div class="card-label" id="roomLabel">Classroom — Top-Down View</div>

        <div class="sticky-header" id="stickyHeader">
          <div class="blackboard">
            <div class="chalk-line"></div>
            <span class="bb-text">✦ Blackboard — Front of Class ✦</span>
          </div>
        </div>

        <!-- DESK GRID -->
        <div class="scroll-x">
          <div class="inner-min">
            <div class="grid-area">
              <div class="row-nums" id="rowNums"></div>

              <div class="desk-grid">
                <div class="col-heads" id="colHeads"></div>
                <div class="desk-rows" id="deskRows"></div>
              </div>
            </div>

            <div class="bottom-row">
              <div class="legend">
                <div class="legend-item">
                  <div class="ldot ldot-joined"></div>
                  <span>Normal Seat</span>
                </div>
                <div class="legend-item">
                  <div class="ldot ldot-lit"></div>
                  <span>Your Seat</span>
                </div>
              </div>
              <div class="compass">⬆ Front</div>
            </div>
          </div>
        </div>
      </div>

      <footer>
        Exam Seating System &bull; Search your name to instantly locate your
        seat
      </footer>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
